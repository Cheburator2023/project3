apiVersion: v1
kind: Service
metadata:
  name: {{ include "backend.fullname" . }}
  labels: {{- include "backend.labels" . | nindent 4 }}
spec:
  ports:
    - name: p4000
      protocol: TCP
      port: 4000
      targetPort: 4000
    - name: p4443
      protocol: TCP
      port: 4443
      targetPort: 4443
  selector:
    app: {{ include "backend.fullname" . }}