{{- $auditSidecarEnabled := eq (lower (toString .Values.auditSidecar.enabled)) "true" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "backend.fullname" . }}
  labels: {{- include "backend.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: {{ include "backend.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  template:
    metadata:
      labels:
        app: {{ include "backend.fullname" . }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.pullSecret }}
      {{- if .Values.affinity.enabled }}
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: nvidia.com/gpu.product
                    operator: DoesNotExist
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.secretName | default (printf "%s-secret" (include "backend.fullname" .)) }}
                  key: "PGUSER"
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.secretName | default (printf "%s-secret" (include "backend.fullname" .)) }}
                  key: "PGPASSWORD"
            - name: PGHOST
              value: "{{ .Values.db.PGHOST }}"
            - name: PGDATABASE
              value: "{{ .Values.db.PGDATABASE }}"
            - name: PGPORT
              value: "{{ .Values.db.PGPORT }}"
            - name: KEYCLOAK_URL
              value: "{{ .Values.keycloak.KEYCLOAK_URL }}"
            - name: KEYCLOAK_REALMS
              value: "{{ .Values.keycloak.KEYCLOAK_REALMS }}"
            - name: KEYCLOAK_CLIENT
              value: "{{ .Values.keycloak.KEYCLOAK_CLIENT }}"
            - name: KEYCLOAK_USER
              valueFrom:
                secretKeyRef:
                  name: {{ template "backend.fullname" . }}-secret
                  key: "KEYCLOAK_USER"
            - name: KEYCLOAK_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ template "backend.fullname" . }}-secret
                  key: "KEYCLOAK_PWD"
            - name: BPMN_API
              value: "{{ .Values.bpmn.BPMN_API }}"
            - name: BPMN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ template "backend.fullname" . }}-secret
                  key: "BPMN_USER"
            - name: BPMN_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ template "backend.fullname" . }}-secret
                  key: "BPMN_PWD"
            - name: BPMN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ template "backend.fullname" . }}-secret
                  key: "BPMN_KEY"
            - name: NODE_ENV
              value: "{{ .Values.bpmn.NODE_ENV }}"
          {{- range $key, $val := .Values.env }}
          {{- if not (and (hasPrefix "AUDIT_" $key) (not $auditSidecarEnabled)) }}
            - name: {{ $key }}
              value: {{ $val | quote }}
          {{- end }}
          {{- end }}
          {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: 4000
              protocol: TCP
            - containerPort: 4443
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if $auditSidecarEnabled }}
        {{- $auditSidecarRepository := default (regexReplaceAll "/[^/]+$" .Values.image.repository (printf "/%s" .Values.auditSidecar.name)) .Values.auditSidecar.image.repository }}
        - name: {{ .Values.auditSidecar.name }}
          image: "{{ $auditSidecarRepository }}:{{ .Values.auditSidecar.image.tag }}"
          imagePullPolicy: {{ .Values.auditSidecar.image.pullPolicy }}
          {{- with .Values.auditSidecar.ports }}
          ports:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.auditSidecar.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.auditSidecar.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.auditSidecar.env .Values.auditSidecar.extraEnv }}
          env:
          {{- range $key, $val := .Values.auditSidecar.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
          {{- end }}
          {{- with .Values.auditSidecar.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- end }}
          {{- with .Values.auditSidecar.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.auditSidecar.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
        {{- if .Values.tracing.enabled }}
        - name: {{ .Values.tracing.name }}
          image: "{{ .Values.tracing.image.repository }}@{{ .Values.tracing.image.digest }}"
          imagePullPolicy: {{ .Values.tracing.image.pullPolicy }}
          resources:
          {{- toYaml .Values.tracing.resources | nindent 12 }}
          args:
            {{- range $key, $value := .Values.tracing.args }}
            {{- if $value }}
            - --{{ $key }}={{ $value }}
            {{- else }}
            - --{{ $key }}
            {{- end }}
            {{- end }}
          env:
            - name: REPORTER_GRPC_TLS_ENABLED
              value: {{ .Values.tracing.enabled | quote }}
            - name: REPORTER_GRPC_TLS_CA
              value: /opt/jaeger/cert/ca-cert.pem
            - name: REPORTER_GRPC_TLS_CERT
              value: /opt/jaeger/cert/client-cert.pem
            - name: REPORTER_GRPC_TLS_KEY
              value: /opt/jaeger/cert/client-cert-key.pem
          volumeMounts:
            - name: jaeger-agent-tls-secret
              readOnly: true
              mountPath: /opt/jaeger/cert/ca-cert.pem
              subPath: "ca-cert.pem"
            - name: jaeger-agent-tls-secret
              readOnly: true
              mountPath: /opt/jaeger/cert/client-cert.pem
              subPath: "client-cert.pem"
            - name: jaeger-agent-tls-secret
              readOnly: true
              mountPath: /opt/jaeger/cert/client-cert-key.pem
              subPath: "client-cert-key.pem"
        {{- end }}
      {{- if or .Values.tracing.enabled .Values.extraVolumes (and $auditSidecarEnabled .Values.auditSidecar.volumes) }}
      volumes:
        {{- if .Values.tracing.enabled }}
        - name: jaeger-agent-tls-secret
          secret:
            secretName: jaeger-agent-tls-secret
            defaultMode: 420
        {{- end }}
        {{- if and $auditSidecarEnabled .Values.auditSidecar.volumes }}
          {{- toYaml .Values.auditSidecar.volumes | nindent 8 }}
        {{- end }}
        {{- with .Values.extraVolumes }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
